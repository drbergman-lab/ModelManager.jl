name: CI
on:
  push:
    branches:
      - main
    tags: ['*']
  pull_request:
  workflow_dispatch:
concurrency:
  # Skip intermediate builds: always.
  # Cancel intermediate builds: only if it is a pull request build.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}

jobs:
  test:
    name: Julia ${{ matrix.julia-version }} - ${{ matrix.os }} - ${{ matrix.arch }} - ${{ github.event_name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    permissions:  # needed for julia-actions/cache to delete old caches
      actions: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        julia-version:
          - 'lts' # long-term support
          - '1' # to check the latest v1 version
          - 'pre' # check upcoming releases
        os: ["ubuntu-latest"]
        arch: ["x64"]
        shell: ["bash"]
        compiler: ["g++"]
        include:
          - os: "macOS-latest"
            julia-version: 'lts'
            shell: "bash"
            compiler: "g++-14"
            arch: "arm64"
          - os: "macOS-latest"
            julia-version: '1'
            shell: "bash"
            compiler: "g++-14"
            arch: "arm64"
          # - os: "windows-latest"
          #   julia-version: '1'
          #   shell: "msys2"
          #   compiler: "g++"
          #   arch: "x64"

    defaults:
      run:
        shell: ${{ matrix.shell }} {0}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - uses: julia-actions/setup-julia@v3
      with:
        version: ${{ matrix.julia-version }}
        arch: ${{ matrix.arch }}

    - name: Add Julia to PATH on Windows
      if: matrix.os == 'windows-latest'
      run: echo "C:\\hostedtoolcache\\windows\\julia\\${{ matrix.julia-version }}\\${{ matrix.arch }}\\bin" >> $GITHUB_PATH

    - uses: julia-actions/cache@v3

    - name: Add BergmanLabRegistry (Windows)
      if: matrix.os == 'windows-latest'
      shell: pwsh
      run: julia -e 'import Pkg; Pkg.Registry.add("General"); Pkg.Registry.add(Pkg.RegistrySpec(url="https://github.com/drbergman-lab/BergmanLabRegistry.git"))'

    - name: Add BergmanLabRegistry (non-Windows)
      if: matrix.os != 'windows-latest'
      run: julia -e 'import Pkg; Pkg.Registry.add("General"); Pkg.Registry.add(Pkg.RegistrySpec(url="https://github.com/drbergman-lab/BergmanLabRegistry.git"))'

    - uses: julia-actions/julia-buildpkg@v1

    - name: Run all tests
      uses: julia-actions/julia-runtest@v1
      env:
        JULIA_DEBUG: ModelManager

    - uses: julia-actions/julia-processcoverage@v1
      with:
        directories: src

    - uses: codecov/codecov-action@v7
      with:
        files: lcov.info
        token: ${{ secrets.CODECOV_TOKEN }} # this is a repo-specific secret since this is (currently) a private repo
        fail_ci_if_error: false

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    permissions:
      actions: write # needed to allow julia-actions/cache to proactively delete old caches that it has created
      contents: write
      statuses: write
    steps:
      - uses: actions/checkout@v6

      - uses: julia-actions/setup-julia@v3
        with:
          version: '1'

      - uses: julia-actions/cache@v3

      - name: Add BergmanLabRegistry
        run: julia -e 'import Pkg; Pkg.Registry.add("General"); Pkg.Registry.add(Pkg.RegistrySpec(url="https://github.com/drbergman-lab/BergmanLabRegistry.git"))'

      - name: Configure doc environment
        shell: julia --project=docs --color=yes {0}
        run: |
          using Pkg
          Pkg.develop(PackageSpec(path=pwd()))
          Pkg.instantiate()

      - uses: julia-actions/julia-buildpkg@v1

      - uses: julia-actions/julia-docdeploy@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOCUMENTER_KEY: ${{ secrets.DOCUMENTER_KEY }}

      - name: Run doctests
        shell: julia --project=docs --color=yes {0}
        env:
          JULIA_DEBUG: Documenter
        run: |
          using Documenter: DocMeta, doctest
          using ModelManager
          DocMeta.setdocmeta!(ModelManager, :DocTestSetup, :(using ModelManager); recursive=true)
          doctest(ModelManager)